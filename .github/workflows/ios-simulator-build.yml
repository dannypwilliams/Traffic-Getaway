name: iOS Simulator Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Traffic Getaway
    runs-on: macos-15
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Verify project
        run: Tools/mac/verify_on_mac.sh
